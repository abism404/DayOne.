<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ACESSO RESTRITO | ARG</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', 'Fira Code', monospace;
      padding: 16px;
    }

    .terminal {
      max-width: 850px;
      width: 100%;
      background: #050505;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    /* Títulos com neon branco */
    h1, h2 {
      font-size: 1.6rem;
      text-align: center;
      color: #f0f0f0;
      text-shadow: 0 0 4px #ffffff;
      margin-bottom: 1.2rem;
      letter-spacing: 1px;
    }

    /* Área de digitação */
    .typewriter-area {
      min-height: 240px;
      margin: 1.5rem 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .message-line {
      font-size: 1rem;
      line-height: 1.5;
      text-align: center;
      color: #dddddd;
      margin: 8px 0;
      padding: 0 12px;
      word-break: break-word;
    }

    /* Input estilo linha de comando */
    .cmd-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid #aaaaaa;
      color: #ffffff;
      font-family: monospace;
      font-size: 1rem;
      padding: 8px 4px;
      text-align: center;
      width: 90%;
      outline: none;
      margin-top: 16px;
    }
    .cmd-input:focus {
      border-bottom-color: #ffffff;
    }

    /* Botões */
    button {
      background: #111;
      border: 1px solid #555;
      color: #eee;
      padding: 10px 18px;
      font-family: monospace;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 12px;
      border-radius: 4px;
    }
    button:hover {
      background: #222;
      border-color: #fff;
    }

    .skip-btn {
      background: #1a1a1a;
      border-color: #666;
      color: #ccc;
      font-size: 0.75rem;
      padding: 6px 12px;
    }

    /* Páginas */
    .page { display: block; }
    .hidden-page { display: none; }

    /* Vídeo responsivo */
    .video-box {
      margin: 16px 0;
      text-align: center;
    }
    iframe, video {
      width: 100%;
      border: 1px solid #444;
      background: black;
      border-radius: 6px;
    }
    iframe {
      height: auto;
      aspect-ratio: 16 / 9;
    }
    video {
      max-height: 280px;
    }

    /* Área de resposta final */
    #responseArea {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 16px;
    }

    /* Mensagens de erro/info */
    .error-msg {
      color: #cc8888;
      text-align: center;
      margin-top: 12px;
      font-size: 0.85rem;
    }
    .info-msg {
      color: #aaa;
      text-align: center;
      font-size: 0.75rem;
      margin: 8px 0;
    }

    /* Botão ADMIN responsivo (canto inferior direito) */
    .admin-btn {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background: #151515;
      border: 1px solid #333;
      color: #aaa;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      z-index: 999;
      border-radius: 4px;
    }

    /* Modal responsivo */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .modal-content {
      background: #0c0c0c;
      border: 1px solid #444;
      width: 100%;
      max-width: 500px;
      padding: 1.5rem;
      border-radius: 12px;
      color: #ddd;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-content input, .modal-content textarea {
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
    }

    /* ========== MEDIA QUERIES PARA MOBILE ========== */
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }
      .terminal {
        padding: 1rem;
      }
      h1, h2 {
        font-size: 1.3rem;
      }
      .message-line {
        font-size: 0.9rem;
      }
      .cmd-input {
        width: 95%;
        font-size: 0.9rem;
      }
      button {
        padding: 8px 16px;
        font-size: 0.85rem;
      }
      .admin-btn {
        bottom: 8px;
        right: 8px;
        font-size: 10px;
        padding: 3px 8px;
      }
      .modal-content {
        padding: 1rem;
      }
    }

    @media (max-width: 480px) {
      .message-line {
        font-size: 0.8rem;
      }
      iframe {
        height: auto;
      }
      .skip-btn {
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>

<div class="terminal">
  <!-- PÁGINA 1: ENIGMA -->
  <div id="page1" class="page">
    <h1>ACESSO RESTRITO</h1>
    <div style="text-align: center; margin: 20px 0; color: #ccc;">
      <p>INSIRA A CREDENCIAL DE ACESSO</p>
    </div>
    <input type="text" id="enigmaInput" class="cmd-input" placeholder=">_ " autocomplete="off" style="width: 100%; text-align: left;">
    <div style="display: flex; justify-content: center; margin-top: 20px;">
      <button id="submitEnigma">VALIDAR</button>
    </div>
    <div id="enigmaError" class="error-msg"></div>
  </div>

  <!-- PÁGINA 2: VÍDEO -->
  <div id="page2" class="page hidden-page">
    <h2>TRANSMISSÃO AUTORIZADA</h2>
    <div class="video-box" id="videoContainer">
      <div id="videoPlayer"></div>
    </div>
    <div class="info-msg" id="videoInfoMsg">▶ Clique no PLAY para iniciar. Após o término, o sistema avançará.</div>
    <div style="text-align: center;">
      <button id="skipVideoBtn" class="skip-btn">[ PULAR TRANSMISSÃO ]</button>
    </div>
  </div>

  <!-- PÁGINA 3: MENSAGENS DIGITADAS + PERGUNTA FINAL -->
  <div id="page3" class="page hidden-page">
    <div class="typewriter-area" id="typewriterArea"></div>
    <div id="responseArea"></div>
  </div>
</div>

<!-- Botão ADMIN -->
<div class="admin-btn" id="adminBtn">⚙ ADMIN</div>

<!-- MODAL DE CONFIGURAÇÕES -->
<div id="adminModal" class="modal">
  <div class="modal-content">
    <h3>CONFIGURAÇÕES</h3>
    <label>🔐 CREDENCIAL DE ACESSO:</label>
    <input type="text" id="configEnigma" value="SILENTIUM">
    <label>🎥 LINK DO VÍDEO (embed .mp4 ou YouTube):</label>
    <input type="text" id="configVideoUrl" value="https://www.youtube.com/embed/w48wLwkq9HI">
    <label>📜 MENSAGENS (uma por linha):</label>
    <textarea id="configMessages" rows="5">SINAL ESTÁVEL.
DECODIFICANDO ARQUIVOS...
ACESSO PARCIAL CONCEDIDO.
REGRESSÃO MEMÓRIA ATIVADA.
VOCÊ ESTÁ DENTRO DO SISTEMA.</textarea>
    <label>❓ PERGUNTA FINAL:</label>
    <input type="text" id="configFinalQuestion" value="QUAL É O NOME DO ARQUIVO?">
    <label>🔑 RESPOSTA CORRETA:</label>
    <input type="text" id="configFinalAnswer" value="ECHELON">
    <label>🔗 LINK DE REDIRECIONAMENTO:</label>
    <input type="text" id="configRedirectUrl" value="https://www.exemplo.com/arquivo_secreto">
    <label>💬 MENSAGEM SE ERRAR:</label>
    <input type="text" id="configWrongMsg" value="ACESSO NEGADO. CREDENCIAIS INVÁLIDAS.">
    <button id="saveConfigBtn">SALVAR</button>
    <button id="closeModalBtn" class="close-modal">FECHAR</button>
  </div>
</div>

<script>
  // CONFIGURAÇÕES PADRÃO
  let appConfig = {
    enigmaAnswer: "SILENTIUM",
    videoUrl: "https://www.youtube.com/embed/w48wLwkq9HI",
    messages: [
      "SINAL ESTÁVEL.",
      "DECODIFICANDO ARQUIVOS...",
      "ACESSO PARCIAL CONCEDIDO.",
      "REGRESSÃO MEMÓRIA ATIVADA.",
      "VOCÊ ESTÁ DENTRO DO SISTEMA."
    ],
    finalQuestion: "QUAL É O NOME DO ARQUIVO?",
    finalAnswer: "ECHELON",
    redirectUrl: "https://www.exemplo.com/arquivo_secreto",
    wrongMessage: "ACESSO NEGADO. CREDENCIAIS INVÁLIDAS."
  };

  let currentPage = 1;
  let typingInterval = null;
  let isTyping = false;
  let awaitingResponse = false;
  let videoEnded = false;
  let ytPlayer = null;

  // DOM
  const page1 = document.getElementById('page1');
  const page2 = document.getElementById('page2');
  const page3 = document.getElementById('page3');
  const enigmaInput = document.getElementById('enigmaInput');
  const submitEnigmaBtn = document.getElementById('submitEnigma');
  const enigmaErrorDiv = document.getElementById('enigmaError');
  const videoPlayerDiv = document.getElementById('videoPlayer');
  const typewriterArea = document.getElementById('typewriterArea');
  const responseArea = document.getElementById('responseArea');
  const skipVideoBtn = document.getElementById('skipVideoBtn');

  // ADMIN
  const adminBtn = document.getElementById('adminBtn');
  const adminModal = document.getElementById('adminModal');
  const configEnigma = document.getElementById('configEnigma');
  const configVideoUrl = document.getElementById('configVideoUrl');
  const configMessages = document.getElementById('configMessages');
  const configFinalQuestion = document.getElementById('configFinalQuestion');
  const configFinalAnswer = document.getElementById('configFinalAnswer');
  const configRedirectUrl = document.getElementById('configRedirectUrl');
  const configWrongMsg = document.getElementById('configWrongMsg');
  const saveConfigBtn = document.getElementById('saveConfigBtn');
  const closeModalBtn = document.getElementById('closeModalBtn');

  function syncConfig() {
    appConfig.enigmaAnswer = configEnigma.value.trim();
    appConfig.videoUrl = configVideoUrl.value.trim();
    const raw = configMessages.value.split(/\r?\n/).filter(l=>l.trim());
    if(raw.length) appConfig.messages = raw;
    appConfig.finalQuestion = configFinalQuestion.value.trim();
    appConfig.finalAnswer = configFinalAnswer.value.trim();
    appConfig.redirectUrl = configRedirectUrl.value.trim();
    appConfig.wrongMessage = configWrongMsg.value.trim();
  }

  function loadToModal() {
    configEnigma.value = appConfig.enigmaAnswer;
    configVideoUrl.value = appConfig.videoUrl;
    configMessages.value = appConfig.messages.join('\n');
    configFinalQuestion.value = appConfig.finalQuestion;
    configFinalAnswer.value = appConfig.finalAnswer;
    configRedirectUrl.value = appConfig.redirectUrl;
    configWrongMsg.value = appConfig.wrongMessage;
  }

  // VÍDEO
  function renderVideo() {
    videoPlayerDiv.innerHTML = "";
    videoEnded = false;
    const url = appConfig.videoUrl;
    if (!url) { videoPlayerDiv.innerHTML = "<p style='color:red'>ERRO: link vazio</p>"; return; }
    if (url.includes('youtube.com/embed/')) {
      const iframe = document.createElement('iframe');
      iframe.src = url + "?enablejsapi=1";
      iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
      iframe.allowFullscreen = true;
      iframe.style.aspectRatio = "16/9";
      iframe.style.width = "100%";
      videoPlayerDiv.appendChild(iframe);
      if (typeof YT === 'undefined') {
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);
        window.onYouTubeIframeAPIReady = () => {
          ytPlayer = new YT.Player(iframe, { events: { 'onStateChange': (e) => { if(e.data === YT.PlayerState.ENDED) onVideoComplete(); } } });
        };
      } else {
        ytPlayer = new YT.Player(iframe, { events: { 'onStateChange': (e) => { if(e.data === YT.PlayerState.ENDED) onVideoComplete(); } } });
      }
    } else {
      const video = document.createElement('video');
      video.controls = true;
      video.style.width = "100%";
      let srcUrl = url;
      if (url.includes('drive.google.com')) {
        let match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
        if (match) srcUrl = `https://drive.google.com/uc?export=download&id=${match[1]}`;
      }
      const source = document.createElement('source');
      source.src = srcUrl;
      source.type = "video/mp4";
      video.appendChild(source);
      video.addEventListener('ended', onVideoComplete);
      videoPlayerDiv.appendChild(video);
      video.load();
    }
  }

  function onVideoComplete() {
    if (!videoEnded && currentPage === 2) {
      videoEnded = true;
      setTimeout(() => { if(currentPage===2) goToPage3(); }, 400);
    }
  }
  function skipVideo() { if(currentPage===2 && !videoEnded) onVideoComplete(); }

  // MENSAGENS DIGITADAS
  function stopTyping() { if(typingInterval) clearInterval(typingInterval); isTyping=false; }
  function typeMessage(msg, cb) {
    stopTyping();
    let idx=0;
    const div = document.createElement('div');
    div.className = 'message-line';
    typewriterArea.appendChild(div);
    isTyping=true;
    typingInterval = setInterval(()=>{
      if(idx<msg.length) { div.textContent += msg[idx]; idx++; }
      else { clearInterval(typingInterval); isTyping=false; if(cb) cb(); }
    }, 45);
  }
  function showMessagesSeq(i) {
    if(i >= appConfig.messages.length) { showFinalQuestion(); return; }
    typeMessage(appConfig.messages[i], ()=>setTimeout(()=>showMessagesSeq(i+1), 400));
  }
  function showFinalQuestion() {
    if(awaitingResponse) return;
    awaitingResponse=true;
    const q = appConfig.finalQuestion;
    const qDiv = document.createElement('div');
    qDiv.className = 'message-line';
    qDiv.style.fontWeight='bold';
    typewriterArea.appendChild(qDiv);
    let ci=0;
    const qInterval = setInterval(()=>{
      if(ci<q.length) { qDiv.textContent += q[ci]; ci++; }
      else { clearInterval(qInterval); createResponseInput(); }
    },45);
  }
  function createResponseInput() {
    responseArea.innerHTML = '';
    const input = document.createElement('input');
    input.type='text'; input.className='cmd-input'; input.placeholder='>_'; input.autocomplete='off';
    const btn = document.createElement('button'); btn.textContent='ENVIAR';
    responseArea.appendChild(input); responseArea.appendChild(btn);
    input.focus();
    const check = () => {
      if(input.value.trim() === appConfig.finalAnswer) window.location.href = appConfig.redirectUrl;
      else {
        const err = document.createElement('div'); err.className='error-msg'; err.textContent = appConfig.wrongMessage;
        responseArea.appendChild(err);
        input.value=''; input.focus();
        setTimeout(()=>err.remove(),2500);
      }
    };
    btn.addEventListener('click', check);
    input.addEventListener('keypress', e=>{if(e.key==='Enter') check();});
  }
  function resetPage3() { stopTyping(); typewriterArea.innerHTML=''; responseArea.innerHTML=''; awaitingResponse=false; }
  function startPage3() { resetPage3(); showMessagesSeq(0); }

  // PÁGINAS
  function showPage(p) {
    page1.classList.add('hidden-page'); page2.classList.add('hidden-page'); page3.classList.add('hidden-page');
    if(p===1) { page1.classList.remove('hidden-page'); currentPage=1; }
    else if(p===2) { page2.classList.remove('hidden-page'); currentPage=2; videoEnded=false; renderVideo(); }
    else if(p===3) { page3.classList.remove('hidden-page'); currentPage=3; startPage3(); }
  }
  function checkEnigma() {
    if(enigmaInput.value.trim() === appConfig.enigmaAnswer) { enigmaErrorDiv.textContent=''; showPage(2); }
    else enigmaErrorDiv.textContent = "ACESSO NEGADO. CREDENCIAL INVÁLIDA.";
  }
  function goToPage3() { showPage(3); }

  // MODAL
  function openModal() { loadToModal(); adminModal.style.display='flex'; }
  function closeModal() { adminModal.style.display='none'; }
  function saveAndClose() { syncConfig(); closeModal(); if(currentPage===3) startPage3(); if(currentPage===2) renderVideo(); }

  // EVENTOS
  submitEnigmaBtn.addEventListener('click', checkEnigma);
  enigmaInput.addEventListener('keypress', e=>{if(e.key==='Enter') checkEnigma();});
  adminBtn.addEventListener('click', openModal);
  closeModalBtn.addEventListener('click', closeModal);
  saveConfigBtn.addEventListener('click', saveAndClose);
  skipVideoBtn.addEventListener('click', skipVideo);

  // INÍCIO
  function init() { showPage(1); loadToModal(); }
  init();
</script>
</body>
</html>
